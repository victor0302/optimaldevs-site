name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  AWS_S3_BUCKET: optimaldevs-site
  AWS_CLOUDFRONT_DISTRIBUTION_ID: E1IHT7N6P3U2Y9
  VITE_CONTACT_API_ENDPOINT: https://vf95n20ew8.execute-api.us-east-1.amazonaws.com/contact

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to S3 + invalidate CloudFront
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets to S3 (long cache)
        run: |
          aws s3 sync dist/assets/ s3://${{ env.AWS_S3_BUCKET }}/assets/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync root files to S3 (short cache)
        run: |
          aws s3 sync dist/ s3://${{ env.AWS_S3_BUCKET }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
