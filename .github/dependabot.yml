version: 2
updates:
  # NPM packages — batch minor + patch bumps, weekly on Mondays
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions used in .github/workflows — monthly cadence
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
